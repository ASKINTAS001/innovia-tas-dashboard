<title>INNOVIA-TAS · Anmelden</title>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root{
    --anthrazit:#4A4A4A;
    --anthrazit-dark:#333333;
    --rot:#E30613;
    --bg:#F6F5F3;
    --card:#FFFFFF;
    --border:#E4E2DE;
    --text-muted:#8A8A88;
    --text:#2B2B2B;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    font-family:'Helvetica Neue',Arial,sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* dezenter Papier-Vignette-Hintergrund statt harter Flaeche */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(74,74,74,0.05), transparent 55%),
      radial-gradient(ellipse at 50% 110%, rgba(227,6,19,0.04), transparent 55%);
    pointer-events:none;
  }

  .card{
    position:relative;
    width:100%;
    max-width:380px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:48px 40px 40px;
    box-shadow:0 1px 2px rgba(0,0,0,0.03), 0 20px 48px -24px rgba(0,0,0,0.14);
    opacity:0;
    transform:translateY(10px);
    animation:riseIn .6s cubic-bezier(.2,.7,.2,1) forwards;
  }

  @keyframes riseIn{
    to{opacity:1; transform:translateY(0);}
  }

  .logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:8px;
  }
  .logo-wrap img{
    width:70px;
    height:70px;
    display:block;
    opacity:0;
    animation:logoIn .7s ease-out .15s forwards;
  }
  @keyframes logoIn{
    from{opacity:0; transform:scale(.9);}
    to{opacity:1; transform:scale(1);}
  }

  .eyebrow{
    text-align:center;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin:18px 0 2px;
  }
  h1{
    text-align:center;
    font-size:20px;
    font-weight:600;
    margin:0 0 22px;
    color:var(--anthrazit-dark);
  }

  /* Signature-Element: Tinten-Akzentstrich, greift das rote Slash-Motiv des Logos auf */
  .accent-slash{
    width:34px;
    height:4px;
    margin:0 auto 26px;
    background:var(--rot);
    border-radius:2px;
    transform:skewX(-20deg);
  }

  form{display:flex; flex-direction:column; gap:18px;}

  .field{position:relative;}
  .field label{
    display:block;
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:6px;
    letter-spacing:.02em;
  }
  .field input{
    width:100%;
    border:none;
    border-bottom:1.5px solid var(--border);
    background:transparent;
    font-size:16px;
    padding:8px 2px 10px;
    color:var(--text);
    outline:none;
    transition:border-color .25s ease;
  }
  .field input::placeholder{color:#C7C5C0;}
  .field input:focus{border-bottom-color:var(--rot);}

  .submit-btn{
    margin-top:6px;
    padding:13px 18px;
    border:none;
    border-radius:8px;
    background:var(--anthrazit-dark);
    color:#fff;
    font-size:15px;
    font-weight:600;
    letter-spacing:.01em;
    cursor:pointer;
    transition:background .2s ease, transform .12s ease;
  }
  .submit-btn:hover{background:var(--rot);}
  .submit-btn:active{transform:scale(.98);}
  .submit-btn[disabled]{opacity:.6; cursor:default;}

  .error-msg{
    display:none;
    font-size:13px;
    color:var(--rot);
    text-align:center;
    margin-top:-4px;
  }
  .error-msg.show{display:block;}

  .forgot-link{
    text-align:center;
    margin-top:6px;
  }
  .forgot-link a{
    font-size:12.5px;
    color:var(--text-muted);
    text-decoration:none;
    border-bottom:1px dotted transparent;
  }
  .forgot-link a:hover{
    color:var(--anthrazit-dark);
    border-bottom-color:var(--anthrazit-dark);
  }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:#B7B5B0;
    margin-top:30px;
    letter-spacing:.02em;
  }

  /* Reset-Ansicht (Passwort vergessen) */
  .view{display:none;}
  .view.active{display:flex; flex-direction:column; gap:18px;}

  @media (prefers-reduced-motion: reduce){
    .card, .logo-wrap img{animation:none; opacity:1; transform:none;}
  }
</style>
</head>

      <div class="field">
        <label for="newPw">Neues Passwort</label>
        <input type="password" id="newPw" name="newPw" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div class="field">
        <label for="newPw2">Neues Passwort bestaetigen</label>
        <input type="password" id="newPw2" name="newPw2" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div class="error-msg" id="setError"></div>
      <button type="submit" class="submit-btn" id="setBtn">Passwort setzen</button>
      <div class="forgot-link"><a href="#" id="setBackToLogin">Zurueck zur Anmeldung</a></div>
    </form>

    <div class="footer-note">© 2026 Askin Tas · INNOVIA-TAS Designstudio</div>
  </div>

<script>
  // Webhook-Basis (SUB_dashboard_zugang v1.0, Pfad: freigabe-action-v10)
  const WEBHOOK_URL = "https://n8n.syntax-institut.de/webhook/freigabe-action-v10";

  const loginView = document.getElementById('loginView');
  const requestView = document.getElementById('requestView');
  const setView = document.getElementById('setView');
  const loginError = document.getElementById('loginError');
  const requestError = document.getElementById('requestError');
  const setError = document.getElementById('setError');

  // Wenn ein Reset-Token in der URL steckt (?token=...), direkt die "Neues Passwort setzen"-Ansicht zeigen
  const urlToken = new URLSearchParams(window.location.search).get('token');
  if (urlToken) {
    loginView.classList.remove('active');
    setView.classList.add('active');
  }

  document.getElementById('showReset').addEventListener('click', (e) => {
    e.preventDefault();
    loginView.classList.remove('active');
    requestView.classList.add('active');
  });
  document.getElementById('backToLogin').addEventListener('click', (e) => {
    e.preventDefault();
    requestView.classList.remove('active');
    loginView.classList.add('active');
  });
  document.getElementById('setBackToLogin').addEventListener('click', (e) => {
    e.preventDefault();
    setView.classList.remove('active');
    loginView.classList.add('active');
  });

  document.getElementById('setView').addEventListener('submit', async (e) => {
    e.preventDefault();
    setError.classList.remove('show');
    const pw1 = document.getElementById('newPw').value;
    const pw2 = document.getElementById('newPw2').value;
    if (pw1 !== pw2) {
      setError.textContent = 'Die Passwoerter stimmen nicht ueberein.';
      setError.classList.add('show');
      return;
    }
    const btn = document.getElementById('setBtn');
    btn.disabled = true; btn.textContent = 'Speichere...';
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action: 'passwort_setzen', token: urlToken, neues_passwort: pw1 })
      });
      const data = await res.json();
      if (data && data.success) {
        setView.classList.remove('active');
        loginView.classList.add('active');
        loginError.textContent = 'Passwort gesetzt. Bitte anmelden.';
        loginError.style.color = 'var(--anthrazit-dark)';
        loginError.classList.add('show');
      } else {
        setError.textContent = 'Token abgelaufen oder ungueltig. Bitte neuen Link anfordern.';
        setError.classList.add('show');
      }
    } catch (err) {
      setError.textContent = 'Verbindung fehlgeschlagen.';
      setError.classList.add('show');
    } finally {
      btn.disabled = false; btn.textContent = 'Passwort setzen';
    }
  });

  document.getElementById('loginView').addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.classList.remove('show');
    const btn = document.getElementById('loginBtn');
    const user = document.getElementById('user').value;
    const pw = document.getElementById('pw').value;
    btn.disabled = true; btn.textContent = 'Pruefe...';
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action: 'login', username: user, password: pw })
      });
      const data = await res.json();
      if (data && data.success && data.token) {
        // AUTH-FIX 15.07.2026: Session-Token speichern.
        // dashboard.html liest ihn aus localStorage und schickt ihn bei jedem Request mit.
        try {
          localStorage.setItem('innovia_session', JSON.stringify({
            token: data.token,
            gueltig_bis: data.gueltig_bis || ''
          }));
        } catch(_) {}
        window.location.href = 'dashboard.html';
      } else {
        loginError.classList.add('show');
      }
    } catch (err) {
      loginError.textContent = 'Verbindung fehlgeschlagen. Bitte spaeter erneut versuchen.';
      loginError.classList.add('show');
    } finally {
      btn.disabled = false; btn.textContent = 'Anmelden';
    }
  });

  document.getElementById('requestView').addEventListener('submit', async (e) => {
    e.preventDefault();
    requestError.classList.remove('show');
    const btn = document.getElementById('requestBtn');
    const reqUser = document.getElementById('reqUser').value;
    btn.disabled = true; btn.textContent = 'Sende...';
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ action: 'passwort_anfordern', username: reqUser })
      });
      await res.json();
      requestError.style.color = 'var(--anthrazit-dark)';
      requestError.textContent = 'Link wurde gesendet, falls die Adresse hinterlegt ist.';
      requestError.classList.add('show');
    } catch (err) {
      requestError.style.color = 'var(--rot)';
      requestError.textContent = 'Verbindung fehlgeschlagen.';
      requestError.classList.add('show');
    } finally {
      btn.disabled = false; btn.textContent = 'Link anfordern';
    }
  });
</script>

</body>
</html>
